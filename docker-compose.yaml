name: mysqlbot

services:
  gosqlbot-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${SQLBOT_IMAGE:-gosqlbot-app:local}
    container_name: gosqlbot-app
    restart: always
    privileged: true
    networks:
      - sqlbot-network
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - 8000:8000
      - 8001:8001
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      # Database configuration
      POSTGRES_SERVER: postgresql
      POSTGRES_PORT: ${SQLBOT_PG_PORT:-5432}
      POSTGRES_DB: ${SQLBOT_PG_DB:-sqlbot}
      POSTGRES_USER: ${SQLBOT_PG_USER:-root}
      POSTGRES_PASSWORD: ${SQLBOT_PG_PASSWORD:-CHANGE_ME_DB_PASSWORD}
      # Project basic settings
      PROJECT_NAME: "mySQLBot"
      DEFAULT_PWD: ${SQLBOT_DEFAULT_PWD:-CHANGE_ME_ADMIN_PASSWORD}
      # MCP settings
      SERVER_IMAGE_HOST: http://YOUR_SERVE_IP:MCP_PORT/images/
      SKIP_MCP_SETUP: "true"
      # Auth & Security
      SECRET_KEY: ${SQLBOT_SECRET_KEY:-CHANGE_ME_WITH_A_LONG_RANDOM_SECRET}
      # CORS settings
      BACKEND_CORS_ORIGINS: "http://localhost,http://localhost:5173,https://localhost,https://localhost:5173"
      # Logging
      LOG_LEVEL: "INFO"
      SQL_DEBUG: False
      CACHE_TYPE: ${SQLBOT_CACHE_TYPE:-memory}
      CACHE_REDIS_URL: ${SQLBOT_CACHE_REDIS_URL:-}
      SQLBOT_CI_DETERMINISTIC_LLM: ${SQLBOT_CI_DETERMINISTIC_LLM:-0}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-remote}
      EMBEDDING_STARTUP_BACKFILL_POLICY: ${EMBEDDING_STARTUP_BACKFILL_POLICY:-deferred}
      REMOTE_EMBEDDING_BASE_URL: ${REMOTE_EMBEDDING_BASE_URL:-}
      REMOTE_EMBEDDING_API_KEY: ${REMOTE_EMBEDDING_API_KEY:-}
      REMOTE_EMBEDDING_MODEL: ${REMOTE_EMBEDDING_MODEL:-}
      REMOTE_EMBEDDING_TIMEOUT_SECONDS: ${REMOTE_EMBEDDING_TIMEOUT_SECONDS:-30}
    volumes:
      - ${SQLBOT_DATA_DIR:-./data/sqlbot}/excel:/opt/sqlbot/data/excel
      - ${SQLBOT_DATA_DIR:-./data/sqlbot}/file:/opt/sqlbot/data/file
      - ${SQLBOT_DATA_DIR:-./data/sqlbot}/images:/opt/sqlbot/images
      - ${SQLBOT_DATA_DIR:-./data/sqlbot}/logs:/opt/sqlbot/app/logs
  postgresql:
    image: pgvector/pgvector:pg17
    container_name: postgresql
    restart: always
    networks:
      - sqlbot-network
    environment:
      POSTGRES_DB: ${SQLBOT_PG_DB:-sqlbot}
      POSTGRES_USER: ${SQLBOT_PG_USER:-root}
      POSTGRES_PASSWORD: ${SQLBOT_PG_PASSWORD:-CHANGE_ME_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${SQLBOT_PG_DATA_DIR:-./data/postgresql}:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SQLBOT_PG_USER:-root} -d ${SQLBOT_PG_DB:-sqlbot}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  sqlbot-network:
    name: sqlbot-network
