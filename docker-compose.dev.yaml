# 开发环境基础设施 Compose（默认仅 PostgreSQL）
# 用法：
#   默认启动 postgresql（不用 redis）：
#     docker compose -f docker-compose.dev.yaml up -d
#   显式启用 redis：
#     docker compose -f docker-compose.dev.yaml -f docker-compose.dev.redis.yaml up -d
#
# 说明：
#   - 本文件默认只起 postgresql 容器
#   - redis 通过 docker-compose.dev.redis.yaml 叠加启用
#   - 前端、后端在宿主机本地运行（make frontend-dev / make backend-dev）
#   - 端口映射到宿主机非默认端口，避免与本地已有服务冲突

services:
  postgresql:
    image: pgvector/pgvector:pg17
    container_name: sqlbot-postgresql-dev
    restart: unless-stopped
    networks:
      - sqlbot-dev-network
    ports:
      - "${SQLBOT_DEV_PG_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: ${SQLBOT_DEV_PG_DB:-sqlbot}
      POSTGRES_USER: ${SQLBOT_DEV_PG_USER:-sqlbot_user}
      POSTGRES_PASSWORD: ${SQLBOT_DEV_PG_PASSWORD:-DevOnly@123456}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${SQLBOT_DEV_PG_DATA_DIR:-./data/sqlbot/dev/postgresql}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQLBOT_DEV_PG_USER:-sqlbot_user} -d ${SQLBOT_DEV_PG_DB:-sqlbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  sqlbot-dev-network:
    name: sqlbot-dev-network
