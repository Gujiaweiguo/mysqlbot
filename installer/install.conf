# ========================================
# mySQLBot 生产环境安装配置
# ========================================
# 说明：
#   - 安装前修改此文件
#   - 安装脚本 install.sh 会读取此文件并生成运行目录配置
#   - 安装后可通过修改 /opt/sqlbot/.env 调整配置，然后 sctl reload 生效

# ----------------------------------------
# 基础配置
# ----------------------------------------

## 安装目录
SQLBOT_BASE=/opt

## mySQLBot 端口
SQLBOT_WEB_PORT=8000
SQLBOT_MCP_PORT=8001

# ----------------------------------------
# 数据库配置
# ----------------------------------------

## 是否使用外部数据库（false：使用容器内 postgresql；true：使用外部 postgresql）
SQLBOT_EXTERNAL_DB=false

## 数据库地址（external=true 时填写外部地址）
SQLBOT_DB_HOST=localhost

## 数据库端口（external=true 时生效）
SQLBOT_DB_PORT=5432

## 数据库库名
SQLBOT_DB_DB=sqlbot

## 数据库用户名
SQLBOT_DB_USER=sqlbot_user

## 数据库密码（密码如包含特殊字符，请用双引号引起来）
SQLBOT_DB_PASSWORD=CHANGE_ME_STRONG_PASSWORD

# ----------------------------------------
# 其他配置
# ----------------------------------------

## 普通用户默认密码
SQLBOT_DEFAULT_PWD=mySQLBot@123456

## mySQLBot Secret Key（请修改为随机长字符串）
SQLBOT_SECRET_KEY=CHANGE_ME_WITH_A_LONG_RANDOM_SECRET

## CORS 设置（逗号分隔，生产环境请填写实际域名）
SQLBOT_CORS_ORIGINS=http://localhost,http://localhost:5173,https://localhost,https://localhost:5173

## 日志级别：DEBUG, INFO, WARNING, ERROR
SQLBOT_LOG_LEVEL=INFO

## 缓存类型：memory 或 redis
SQLBOT_CACHE_TYPE=redis

## Redis 连接地址（仅在 SQLBOT_CACHE_TYPE=redis 时生效）
SQLBOT_CACHE_REDIS_URL=redis://redis:6379/0

## MCP 图片存储路径
SQLBOT_SERVER_IMAGE_HOST=http://YOUR_SERVER_IP:MCP_PORT/images/

## Token 过期时间：60 minutes * 24 hours * 8 days = 11520 minutes
SQLBOT_ACCESS_TOKEN_EXPIRE_MINUTES=11520
