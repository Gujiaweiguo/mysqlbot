services:
  mysqlbot-app:
    image: registry.cn-qingdao.aliyuncs.com/dataease/sqlbot:SQLBOT_TAG
    container_name: mysqlbot-app
    restart: always
    privileged: true
    networks:
      - sqlbot-network
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - ${SQLBOT_WEB_PORT}:8000
      - ${SQLBOT_MCP_PORT}:8001
    env_file:
      - conf/sqlbot.conf
    volumes:
      - ./data/sqlbot/excel:/opt/sqlbot/data/excel
      - ./data/sqlbot/file:/opt/sqlbot/data/file
      - ./data/sqlbot/images:/opt/sqlbot/images
      - ./data/sqlbot/logs:/opt/sqlbot/app/logs
  postgresql:
    image: pgvector/pgvector:pg17
    container_name: sqlbot-postgresql
    restart: always
    networks:
      - sqlbot-network
    environment:
      POSTGRES_DB: ${SQLBOT_DB_DB}
      POSTGRES_USER: ${SQLBOT_DB_USER}
      POSTGRES_PASSWORD: ${SQLBOT_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${SQLBOT_DB_USER} -d ${SQLBOT_DB_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  sqlbot-network:
