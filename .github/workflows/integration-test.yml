name: Integration Test (G0-G5)

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yaml'
      - 'Dockerfile*'
      - 'start.sh'
      - '.github/workflows/integration-test.yml'
      - '.github/workflows/quality-check.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run end-to-end tests (G4/G5)'
        required: false
        default: true
        type: boolean

jobs:
  runtime-health:
    name: G0 Runtime Health
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          for i in {1..60}; do
            POSTGRES_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' postgresql 2>/dev/null || true)
            APP_STATUS=$(docker inspect -f '{{.State.Status}}' gosqlbot-app 2>/dev/null || true)
            if [ "$POSTGRES_STATUS" = "healthy" ] && [ "$APP_STATUS" = "running" ]; then
              echo "Services are healthy"
              break
            fi
            sleep 5
          done
          docker compose ps
          if [ "$POSTGRES_STATUS" != "healthy" ] || [ "$APP_STATUS" != "running" ]; then
            echo "::error::Services did not reach ready state (postgresql=$POSTGRES_STATUS, app=$APP_STATUS)"
            exit 1
          fi

      - name: Check login page
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/#/login)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login page returned $HTTP_CODE"
            exit 1
          fi
          
      - name: Check login API
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/system/parameter/login)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login API returned $HTTP_CODE"
            exit 1
          fi

      - name: Snapshot compose status
        if: always()
        run: |
          mkdir -p artifacts/runtime-health
          docker compose ps | tee artifacts/runtime-health/compose-ps.txt

      - name: Collect runtime logs on failure
        if: failure()
        run: |
          mkdir -p artifacts/runtime-health
          docker compose logs --no-color gosqlbot-app > artifacts/runtime-health/gosqlbot-app.log || true
          docker compose logs --no-color postgresql > artifacts/runtime-health/postgresql.log || true

      - name: Upload runtime diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-health-artifacts
          path: artifacts/runtime-health/
          retention-days: 7

  fixture-check:
    name: G3 Fixture Check
    runs-on: ubuntu-latest
    needs: runtime-health
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d
          for i in {1..60}; do
            POSTGRES_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' postgresql 2>/dev/null || true)
            APP_STATUS=$(docker inspect -f '{{.State.Status}}' gosqlbot-app 2>/dev/null || true)
            if [ "$POSTGRES_STATUS" = "healthy" ] && [ "$APP_STATUS" = "running" ]; then
              break
            fi
            sleep 5
          done
          if [ "$POSTGRES_STATUS" != "healthy" ] || [ "$APP_STATUS" != "running" ]; then
            echo "::error::Services did not reach ready state (postgresql=$POSTGRES_STATUS, app=$APP_STATUS)"
            exit 1
          fi

      - name: Check demo_sales schema
        run: |
          SCHEMA=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT nspname FROM pg_namespace WHERE nspname='demo_sales';")
          if [ "$SCHEMA" != "demo_sales" ]; then
            echo "::error::demo_sales schema not found"
            exit 1
          fi

      - name: Check fixture data and metadata
        run: |
          CUSTOMERS=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT count(*) FROM demo_sales.customers;")
          ORDERS=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT count(*) FROM demo_sales.orders;")
          DATASOURCE_NUM=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT num FROM core_datasource WHERE id=1;")
          TABLE_NAMES=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT string_agg(table_name, ',' ORDER BY table_name) FROM core_table WHERE ds_id=1;")
          FIELD_COUNT=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT count(*) FROM core_field WHERE ds_id=1;")
          echo "Customers: $CUSTOMERS, Orders: $ORDERS, Datasource num: $DATASOURCE_NUM, Tables: $TABLE_NAMES, Fields: $FIELD_COUNT"
          
          if [ "$CUSTOMERS" -lt 3 ]; then
            echo "::error::Insufficient customers: $CUSTOMERS < 3"
            exit 1
          fi
          if [ "$ORDERS" -lt 4 ]; then
            echo "::error::Insufficient orders: $ORDERS < 4"
            exit 1
          fi
          if [ "$DATASOURCE_NUM" != "2/2" ]; then
            echo "::error::Unexpected core_datasource.id=1 num value: $DATASOURCE_NUM"
            exit 1
          fi
          if [[ "$TABLE_NAMES" != *"customers"* ]] || [[ "$TABLE_NAMES" != *"orders"* ]]; then
            echo "::error::Datasource metadata missing required tables: $TABLE_NAMES"
            exit 1
          fi
          if [ "$FIELD_COUNT" -lt 1 ]; then
            echo "::error::Datasource metadata field count is empty"
            exit 1
          fi

  e2e-tests:
    name: G4 Happy Path Regression
    runs-on: ubuntu-latest
    needs: [runtime-health, fixture-check]
    if: github.event_name != 'workflow_dispatch' || inputs.run_e2e
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d
          for i in {1..60}; do
            POSTGRES_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' postgresql 2>/dev/null || true)
            APP_STATUS=$(docker inspect -f '{{.State.Status}}' gosqlbot-app 2>/dev/null || true)
            if [ "$POSTGRES_STATUS" = "healthy" ] && [ "$APP_STATUS" = "running" ]; then
              break
            fi
            sleep 5
          done
          if [ "$POSTGRES_STATUS" != "healthy" ] || [ "$APP_STATUS" != "running" ]; then
            echo "::error::Services did not reach ready state (postgresql=$POSTGRES_STATUS, app=$APP_STATUS)"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Run G4 Happy Path
        working-directory: backend
        run: |
          uv sync
          bash scripts/regression/g4-happy-path-demo-sales.sh --base-url http://127.0.0.1:8000

      - name: Upload G4 evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: g4-evidence
          path: docs/regression/evidence/g4-*.json
          retention-days: 7

  failure-path-tests:
    name: G5 Failure Path Regression
    runs-on: ubuntu-latest
    needs: [runtime-health, fixture-check, e2e-tests]
    if: github.event_name != 'workflow_dispatch' || inputs.run_e2e
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d
          for i in {1..60}; do
            POSTGRES_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' postgresql 2>/dev/null || true)
            APP_STATUS=$(docker inspect -f '{{.State.Status}}' gosqlbot-app 2>/dev/null || true)
            if [ "$POSTGRES_STATUS" = "healthy" ] && [ "$APP_STATUS" = "running" ]; then
              break
            fi
            sleep 5
          done
          if [ "$POSTGRES_STATUS" != "healthy" ] || [ "$APP_STATUS" != "running" ]; then
            echo "::error::Services did not reach ready state (postgresql=$POSTGRES_STATUS, app=$APP_STATUS)"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Run G5 Failure Path
        working-directory: backend
        run: |
          uv sync
          bash scripts/regression/g5-failure-path-demo-sales.sh --base-url http://127.0.0.1:8000

      - name: Upload G5 evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: g5-evidence
          path: docs/regression/evidence/g5-*.json
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [runtime-health, fixture-check, e2e-tests, failure-path-tests]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Name | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| G0 | Runtime Health | ${{ needs.runtime-health.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| G3 | Fixture & Metadata | ${{ needs.fixture-check.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| G4 | Happy Path Regression | ${{ needs.e2e-tests.result == 'success' && '✅ PASS' || (needs.e2e-tests.result == 'skipped' && '⏭️ SKIPPED' || '❌ FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| G5 | Failure Path Regression | ${{ needs.failure-path-tests.result == 'success' && '✅ PASS' || (needs.failure-path-tests.result == 'skipped' && '⏭️ SKIPPED' || '❌ FAIL') }} |" >> $GITHUB_STEP_SUMMARY

           if [ "${{ needs.runtime-health.result }}" != "success" ] || [ "${{ needs.fixture-check.result }}" != "success" ]; then
             echo "::error::Required gates failed"
             exit 1
           fi

          if [ "${{ needs.e2e-tests.result }}" = "failure" ] || [ "${{ needs.e2e-tests.result }}" = "cancelled" ]; then
            echo "::error::E2E gate failed"
            exit 1
          fi

          if [ "${{ needs.failure-path-tests.result }}" = "failure" ] || [ "${{ needs.failure-path-tests.result }}" = "cancelled" ]; then
            echo "::error::Failure-path gate failed"
            exit 1
          fi
