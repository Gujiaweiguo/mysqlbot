name: Integration Test (G0-G5)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run end-to-end tests (G4/G5)'
        required: false
        default: true
        type: boolean

jobs:
  runtime-health:
    name: G0 Runtime Health
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          for i in {1..60}; do
            if docker compose ps | grep -q "healthy"; then
              echo "Services are healthy"
              break
            fi
            sleep 5
          done
          docker compose ps

      - name: Check login page
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/#/login)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login page returned $HTTP_CODE"
            exit 1
          fi
          
      - name: Check login API
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/system/parameter/login)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login API returned $HTTP_CODE"
            exit 1
          fi

  fixture-check:
    name: G3 Fixture Check
    runs-on: ubuntu-latest
    needs: runtime-health
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d
          for i in {1..60}; do
            if docker compose ps | grep -q "healthy"; then
              break
            fi
            sleep 5
          done

      - name: Check demo_sales schema
        run: |
          SCHEMA=$(docker exec mysqlbot psql -U root -d sqlbot -t -A -c "SELECT nspname FROM pg_namespace WHERE nspname='demo_sales';")
          if [ "$SCHEMA" != "demo_sales" ]; then
            echo "::error::demo_sales schema not found"
            exit 1
          fi

      - name: Check fixture data
        run: |
          CUSTOMERS=$(docker exec mysqlbot psql -U root -d sqlbot -t -A -c "SELECT count(*) FROM demo_sales.customers;")
          ORDERS=$(docker exec mysqlbot psql -U root -d sqlbot -t -A -c "SELECT count(*) FROM demo_sales.orders;")
          echo "Customers: $CUSTOMERS, Orders: $ORDERS"
          
          if [ "$CUSTOMERS" -lt 3 ]; then
            echo "::error::Insufficient customers: $CUSTOMERS < 3"
            exit 1
          fi
          if [ "$ORDERS" -lt 4 ]; then
            echo "::error::Insufficient orders: $ORDERS < 4"
            exit 1
          fi

  e2e-tests:
    name: G4/G5 E2E Tests
    runs-on: ubuntu-latest
    needs: [runtime-health, fixture-check]
    if: github.event.inputs.run_e2e == 'true'
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d
          for i in {1..60}; do
            if docker compose ps | grep -q "healthy"; then
              break
            fi
            sleep 5
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Run G4 Happy Path
        working-directory: backend
        run: |
          uv sync
          bash scripts/regression/g4-happy-path-demo-sales.sh --base-url http://127.0.0.1:8000
        continue-on-error: true

      - name: Upload G4 evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: g4-evidence
          path: docs/regression/evidence/g4-*.json
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [runtime-health, fixture-check, e2e-tests]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Integration Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Name | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| G0 | Runtime Health | ${{ needs.runtime-health.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| G3 | Fixture & Metadata | ${{ needs.fixture-check.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| G4/G5 | E2E Tests | ${{ needs.e2e-tests.result == 'success' && '✅ PASS' || (needs.e2e-tests.result == 'skipped' && '⏭️ SKIPPED' || '❌ FAIL') }} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.runtime-health.result }}" != "success" ] || [ "${{ needs.fixture-check.result }}" != "success" ]; then
            echo "::error::Required gates failed"
            exit 1
          fi
