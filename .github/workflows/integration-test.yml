name: Integration Test (G0-G5)

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yaml'
      - 'Dockerfile*'
      - 'start.sh'
      - '.github/workflows/integration-test.yml'
      - '.github/workflows/quality-check.yml'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run end-to-end tests (G4/G5)'
        required: false
        default: true
        type: boolean

jobs:
  runtime-health:
    name: G0 Runtime Health
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local sqlbot base image
        run: |
          docker build -t sqlbot-base:ubuntu24 -f Dockerfile-base .

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          for i in {1..60}; do
            POSTGRES_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' postgresql 2>/dev/null || true)
            APP_STATUS=$(docker inspect -f '{{.State.Status}}' gosqlbot-app 2>/dev/null || true)
            if [ "$POSTGRES_STATUS" = "healthy" ] && [ "$APP_STATUS" = "running" ]; then
              echo "Services are healthy"
              break
            fi
            sleep 5
          done
          docker compose ps
          if [ "$POSTGRES_STATUS" != "healthy" ] || [ "$APP_STATUS" != "running" ]; then
            echo "::error::Services did not reach ready state (postgresql=$POSTGRES_STATUS, app=$APP_STATUS)"
            exit 1
          fi

          echo "Waiting for login API readiness..."
          for i in {1..24}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/system/parameter/login || true)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Login API is ready"
              break
            fi
            sleep 5
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login API did not become ready (last HTTP code: $HTTP_CODE)"
            exit 1
          fi

      - name: Check login page
        run: |
          for i in {1..12}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/#/login || true)
            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi
            sleep 5
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login page returned $HTTP_CODE"
            exit 1
          fi
          
      - name: Check login API
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/system/parameter/login)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login API returned $HTTP_CODE"
            exit 1
          fi

      - name: Snapshot compose status
        if: always()
        run: |
          mkdir -p artifacts/runtime-health
          docker compose ps | tee artifacts/runtime-health/compose-ps.txt

      - name: Collect runtime logs on failure
        if: failure()
        run: |
          mkdir -p artifacts/runtime-health
          docker compose logs --no-color gosqlbot-app > artifacts/runtime-health/gosqlbot-app.log || true
          docker compose logs --no-color postgresql > artifacts/runtime-health/postgresql.log || true

      - name: Upload runtime diagnostics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-health-artifacts
          path: artifacts/runtime-health/
          retention-days: 7

  fixture-check:
    name: G3 Fixture Check
    runs-on: ubuntu-latest
    needs: runtime-health
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local sqlbot base image
        run: |
          docker build -t sqlbot-base:ubuntu24 -f Dockerfile-base .

      - name: Start services
        run: |
          docker compose up -d
          for i in {1..60}; do
            POSTGRES_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' postgresql 2>/dev/null || true)
            APP_STATUS=$(docker inspect -f '{{.State.Status}}' gosqlbot-app 2>/dev/null || true)
            if [ "$POSTGRES_STATUS" = "healthy" ] && [ "$APP_STATUS" = "running" ]; then
              break
            fi
            sleep 5
          done
          if [ "$POSTGRES_STATUS" != "healthy" ] || [ "$APP_STATUS" != "running" ]; then
            echo "::error::Services did not reach ready state (postgresql=$POSTGRES_STATUS, app=$APP_STATUS)"
            exit 1
          fi

          for i in {1..24}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/system/parameter/login || true)
            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi
            sleep 5
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Login API did not become ready (last HTTP code: $HTTP_CODE)"
            exit 1
          fi

      - name: Prepare demo_sales fixture and datasource metadata
        run: |
          docker exec -i postgresql psql -U root -d sqlbot <<'SQL'
          CREATE SCHEMA IF NOT EXISTS demo_sales;
          CREATE TABLE IF NOT EXISTS demo_sales.customers (
            customer_id BIGINT PRIMARY KEY,
            customer_name TEXT NOT NULL
          );
          CREATE TABLE IF NOT EXISTS demo_sales.orders (
            order_id BIGINT PRIMARY KEY,
            customer_id BIGINT NOT NULL,
            order_status TEXT NOT NULL,
            order_amount NUMERIC(12,2) NOT NULL
          );
          TRUNCATE TABLE demo_sales.orders, demo_sales.customers RESTART IDENTITY;
          INSERT INTO demo_sales.customers (customer_id, customer_name) VALUES
            (1, 'Acme Corp'),
            (2, 'Globex'),
            (3, 'Initech');
          INSERT INTO demo_sales.orders (order_id, customer_id, order_status, order_amount) VALUES
            (1, 1, 'paid', 120.50),
            (2, 1, 'pending', 88.00),
            (3, 2, 'paid', 340.10),
            (4, 3, 'cancelled', 12.50);
          SQL

          docker exec -i gosqlbot-app python - <<'PY'
          import json
          from sqlalchemy import delete
          from sqlmodel import Session, select

          from apps.datasource.crud.datasource import DEFAULT_INTERNAL_DS_NAME, _get_datasource_conf
          from apps.datasource.models.datasource import CoreDatasource, CoreField, CoreTable
          from apps.datasource.utils.utils import aes_encrypt
          from common.core.db import engine

          with Session(engine) as session:
              ds = session.exec(
                  select(CoreDatasource).where(CoreDatasource.name == DEFAULT_INTERNAL_DS_NAME)
              ).first()
              if ds is None:
                  raise RuntimeError('internal datasource not found')

              conf = _get_datasource_conf(ds)
              conf.dbSchema = 'demo_sales'
              ds.configuration = aes_encrypt(json.dumps(conf.to_dict())).decode('utf-8')
              ds.num = '2/2'
              session.add(ds)
              session.commit()
              session.refresh(ds)

              session.exec(delete(CoreField).where(CoreField.ds_id == ds.id))
              session.exec(delete(CoreTable).where(CoreTable.ds_id == ds.id))
              session.commit()

              customers = CoreTable(id=0, ds_id=ds.id, checked=True, table_name='customers', table_comment='customers table', custom_comment='customers table', embedding='')
              orders = CoreTable(id=0, ds_id=ds.id, checked=True, table_name='orders', table_comment='orders table', custom_comment='orders table', embedding='')
              object.__setattr__(customers, 'id', None)
              object.__setattr__(orders, 'id', None)
              session.add(customers)
              session.add(orders)
              session.commit()
              session.refresh(customers)
              session.refresh(orders)

              fields = [
                  CoreField(id=0, ds_id=ds.id, table_id=customers.id, checked=True, field_name='customer_id', field_type='bigint', field_comment='customer id', custom_comment='customer id', field_index=0),
                  CoreField(id=0, ds_id=ds.id, table_id=customers.id, checked=True, field_name='customer_name', field_type='text', field_comment='customer name', custom_comment='customer name', field_index=1),
                  CoreField(id=0, ds_id=ds.id, table_id=orders.id, checked=True, field_name='order_id', field_type='bigint', field_comment='order id', custom_comment='order id', field_index=0),
                  CoreField(id=0, ds_id=ds.id, table_id=orders.id, checked=True, field_name='customer_id', field_type='bigint', field_comment='customer id', custom_comment='customer id', field_index=1),
                  CoreField(id=0, ds_id=ds.id, table_id=orders.id, checked=True, field_name='order_status', field_type='text', field_comment='order status', custom_comment='order status', field_index=2),
                  CoreField(id=0, ds_id=ds.id, table_id=orders.id, checked=True, field_name='order_amount', field_type='numeric', field_comment='order amount', custom_comment='order amount', field_index=3),
              ]
              for field in fields:
                  object.__setattr__(field, 'id', None)
                  session.add(field)
              session.commit()
          PY

      - name: Check demo_sales schema
        run: |
          SCHEMA=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT nspname FROM pg_namespace WHERE nspname='demo_sales';")
          if [ "$SCHEMA" != "demo_sales" ]; then
            echo "::error::demo_sales schema not found"
            exit 1
          fi

      - name: Check fixture data and metadata
        run: |
          CUSTOMERS=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT count(*) FROM demo_sales.customers;")
          ORDERS=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT count(*) FROM demo_sales.orders;")
          DATASOURCE_NUM=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT num FROM core_datasource WHERE id=1;")
          TABLE_NAMES=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT string_agg(table_name, ',' ORDER BY table_name) FROM core_table WHERE ds_id=1;")
          FIELD_COUNT=$(docker exec postgresql psql -U root -d sqlbot -t -A -c "SELECT count(*) FROM core_field WHERE ds_id=1;")
          echo "Customers: $CUSTOMERS, Orders: $ORDERS, Datasource num: $DATASOURCE_NUM, Tables: $TABLE_NAMES, Fields: $FIELD_COUNT"
          
          if [ "$CUSTOMERS" -lt 3 ]; then
            echo "::error::Insufficient customers: $CUSTOMERS < 3"
            exit 1
          fi
          if [ "$ORDERS" -lt 4 ]; then
            echo "::error::Insufficient orders: $ORDERS < 4"
            exit 1
          fi
          if [ "$DATASOURCE_NUM" != "2/2" ]; then
            echo "::error::Unexpected core_datasource.id=1 num value: $DATASOURCE_NUM"
            exit 1
          fi
          if [[ "$TABLE_NAMES" != *"customers"* ]] || [[ "$TABLE_NAMES" != *"orders"* ]]; then
            echo "::error::Datasource metadata missing required tables: $TABLE_NAMES"
            exit 1
          fi
          if [ "$FIELD_COUNT" -lt 1 ]; then
            echo "::error::Datasource metadata field count is empty"
            exit 1
          fi

  e2e-tests:
    name: G4 Happy Path Regression
    runs-on: ubuntu-latest
    needs: [runtime-health, fixture-check]
    if: github.event_name != 'workflow_dispatch' || inputs.run_e2e
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local sqlbot base image
