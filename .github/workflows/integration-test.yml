              session.commit()

              customers = CoreTable(id=0, ds_id=ds.id, checked=True, table_name='customers', table_comment='customers table', custom_comment='customers table', embedding='')
              orders = CoreTable(id=0, ds_id=ds.id, checked=True, table_name='orders', table_comment='orders table', custom_comment='orders table', embedding='')
              object.__setattr__(customers, 'id', None)
              object.__setattr__(orders, 'id', None)
              session.add(customers)
              session.add(orders)
              session.commit()
              session.refresh(customers)
              session.refresh(orders)

              fields = [
                  CoreField(id=0, ds_id=ds.id, table_id=customers.id, checked=True, field_name='customer_id', field_type='bigint', field_comment='customer id', custom_comment='customer id', field_index=0),
                  CoreField(id=0, ds_id=ds.id, table_id=customers.id, checked=True, field_name='customer_name', field_type='text', field_comment='customer name', custom_comment='customer name', field_index=1),
                  CoreField(id=0, ds_id=ds.id, table_id=orders.id, checked=True, field_name='order_id', field_type='bigint', field_comment='order id', custom_comment='order id', field_index=0),
                  CoreField(id=0, ds_id=ds.id, table_id=orders.id, checked=True, field_name='customer_id', field_type='bigint', field_comment='customer id', custom_comment='customer id', field_index=1),
                  CoreField(id=0, ds_id=ds.id, table_id=orders.id, checked=True, field_name='order_status', field_type='text', field_comment='order status', custom_comment='order status', field_index=2),
                  CoreField(id=0, ds_id=ds.id, table_id=orders.id, checked=True, field_name='order_amount', field_type='numeric', field_comment='order amount', custom_comment='order amount', field_index=3),
              ]
              for field in fields:
                  object.__setattr__(field, 'id', None)
                  session.add(field)
              session.commit()
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Run G4 Happy Path
        working-directory: backend
        run: |
          uv sync
          G4_ARGS="--base-url http://127.0.0.1:8000"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            G4_ARGS="$G4_ARGS --max-cases 1"
          fi
          bash scripts/regression/g4-happy-path-demo-sales.sh $G4_ARGS

      - name: Upload G4 evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: g4-evidence
          path: docs/regression/evidence/g4-*.json
          retention-days: 7

