name: Quality Check (G1-G2)

on:
  push:
    branches: [main, master, dev, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.pre-commit-config.yaml'
      - 'backend/pyproject.toml'
      - 'frontend/package.json'
      - '.github/workflows/quality-check.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.pre-commit-config.yaml'
      - 'backend/pyproject.toml'
      - 'frontend/package.json'
      - '.github/workflows/quality-check.yml'
  workflow_dispatch:

jobs:
  backend-quality:
    name: G1 Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra cpu

      - name: Run startup smoke
        run: |
          uv run --no-sync pytest tests/test_startup_smoke.py -v

      - name: Get changed Python files
        id: changed-files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.base_ref }}"
          else
            BASE="origin/main"
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMRTUXB $BASE...HEAD -- '*.py' | grep -E '^backend/' | sed 's|^backend/||' | tr '\n' ' ' || true)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED"

      - name: Run mypy
        if: steps.changed-files.outputs.files != ''
        run: |
          uv run mypy --follow-imports=silent --ignore-missing-imports ${{ steps.changed-files.outputs.files }}

      - name: Run ruff check
        if: steps.changed-files.outputs.files != ''
        run: |
          uv run ruff check ${{ steps.changed-files.outputs.files }}

      - name: Run ruff format check
        if: steps.changed-files.outputs.files != ''
        run: |
          uv run ruff format ${{ steps.changed-files.outputs.files }} --check

      - name: Run tests with coverage
        run: |
          uv run --extra cpu pytest --cov=apps --cov=common --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  frontend-quality:
    name: G2 Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  frontend-playwright-smoke:
    name: G2a Frontend Playwright Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        env:
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright blob report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-playwright-blob-report
          path: frontend/blob-report/
          retention-days: 7

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, frontend-playwright-smoke]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Quality Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| G1 Backend Quality | ${{ needs.backend-quality.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| G2 Frontend Quality | ${{ needs.frontend-quality.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| G2a Frontend Playwright Smoke | ${{ needs.frontend-playwright-smoke.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.backend-quality.result }}" != "success" ] || [ "${{ needs.frontend-quality.result }}" != "success" ] || [ "${{ needs.frontend-playwright-smoke.result }}" != "success" ]; then
            echo "::error::Quality check failed"
            exit 1
          fi
